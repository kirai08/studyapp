<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="勉強アプリ">

<link rel="apple-touch-icon" href="icon-192.png">
<title>StudyFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #242440;
  --accent: #7c6af7;
  --accent2: #f7a26a;
  --text: #e8e8f0;
  --text2: #9090b0;
  --green: #5fcb8b;
  --red: #f76a7c;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--surface2);
  padding: 12px 0 20px;
  z-index: 100;
}

.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 12px;
  transition: all 0.2s;
}

.nav-btn .icon { font-size: 22px; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active .icon { transform: scale(1.15); }

/* PAGES */
.page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

.page-title {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}

/* CARD */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--surface2);
}

.card-label {
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* INPUTS */
input, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid #333360;
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 10px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--text2); }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}

.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: var(--green); color: #0f1a14; }
.btn-danger { background: var(--red); color: white; }
.btn-ghost { background: var(--surface2); color: var(--text); }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: 8px; }

.btn-row { display: flex; gap: 10px; margin-top: 8px; }

/* TIMER */
.timer-display {
  font-family: 'Space Mono', monospace;
  font-size: 64px;
  font-weight: 700;
  text-align: center;
  padding: 32px 0;
  letter-spacing: -2px;
  line-height: 1;
}

.timer-display.overtime { color: var(--red); }
.timer-display.break { color: var(--accent2); }
.timer-display.normal { color: var(--text); }

.timer-status {
  text-align: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 8px;
}

.timer-page-info {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--accent);
}

/* PROGRESS BAR */
.progress-bar {
  background: var(--surface2);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
  margin: 12px 0 20px;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.5s ease;
}

/* STATS */
.stat-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.stat-box {
  flex: 1;
  background: var(--surface2);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.stat-val {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}

.stat-lbl {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
}

/* CALENDAR */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.cal-title {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.cal-weekday {
  text-align: center;
  font-size: 10px;
  color: var(--text2);
  padding: 4px 0;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 13px;
  background: var(--surface2);
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.cal-day:active { transform: scale(0.92); }
.cal-day.today { background: var(--accent); color: white; font-weight: 700; }
.cal-day.has-plan::after {
  content: '';
  position: absolute;
  bottom: 4px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent2);
}
.cal-day.has-study::after {
  background: var(--green);
}
.cal-day.empty { background: transparent; cursor: default; }

/* PLAN ITEMS */
.plan-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--surface2);
  border-radius: 10px;
  margin-bottom: 8px;
}

.plan-check {
  width: 20px; height: 20px;
  accent-color: var(--accent);
  cursor: pointer;
}

.plan-info { flex: 1; font-size: 13px; }
.plan-subject { font-weight: 700; color: var(--text); }
.plan-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
.plan-done .plan-subject { text-decoration: line-through; color: var(--text2); }

/* CHART */
canvas { border-radius: 12px; }

.chart-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.chart-toggle .btn-sm {
  background: var(--surface2);
  color: var(--text2);
}
.chart-toggle .btn-sm.active {
  background: var(--accent);
  color: white;
}

/* SUBJECT TAGS */
.subject-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.subject-tag {
  padding: 6px 14px;
  border-radius: 99px;
  background: var(--surface2);
  font-size: 13px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}

.subject-tag.selected {
  border-color: var(--accent);
  color: var(--accent);
}

/* ACHIEVEMENT RATE */
.rate-display {
  font-family: 'Space Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  color: var(--green);
  text-align: center;
  padding: 12px 0;
}

/* ACTUAL LOG */
.actual-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}

.actual-time {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--green);
}

/* SETTINGS */
.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
  background: var(--surface2);
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 14px;
}

.tag-select {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

select[multiple] {
  height: 100px;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin: 16px 0 8px;
  letter-spacing: 0.5px;
}

.divider {
  height: 1px;
  background: var(--surface2);
  margin: 16px 0;
}
</style>

</head>

<script>
// ========== STATE ==========
const defaultSubjects = ["国語①","国語②","数学①","数学②","英語①","英語②","理科①","理科②","社会①","社会②"];
let subjects = [], studyData = {}, plans = {};
let mainChart = null, compareChart = null;
let chartMode = 'day';
let selectedSubjects = new Set();
let currentCalDate = new Date();

// タイマー state
let timerState = null; // { subject, totalPages, timePerPage, currentPage, startTime, pageStartTime, isBreak, completedPages }

// ========== INIT ==========
window.onload = () => {
  subjects = JSON.parse(localStorage.getItem("subjects")) || [...defaultSubjects];
  studyData = JSON.parse(localStorage.getItem("studyData")) || {};
  plans = JSON.parse(localStorage.getItem("plans")) || {};
  timerState = JSON.parse(localStorage.getItem("timerState")) || null;

  renderSubjects();
  renderGraphPage();
  renderCalendar();
  renderSettingsSubjects();
  updateTodayStats();

  // タイマー復元
  if (timerState) {
    document.getElementById("timer-card").style.display = "block";
    startTimerLoop();
  }

  // 今日の日付をデフォルト
  document.getElementById("datePicker").value = today();

  // カレンダーの曜日ヘッダー
  const days = ['日','月','火','水','木','金','土'];
  const wh = document.getElementById("cal-weekdays");
  days.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-weekday";
    el.textContent = d;
    wh.appendChild(el);
  });

  // Service Worker登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
};

// ========== UTILS ==========
function today() {
  return new Date().toISOString().split("T")[0];
}

function fmt(sec) {
  const s = Math.abs(sec);
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}

function save() {
  localStorage.setItem("studyData", JSON.stringify(studyData));
  localStorage.setItem("plans", JSON.stringify(plans));
  localStorage.setItem("subjects", JSON.stringify(subjects));
}

function saveTimerState() {
  if (timerState) localStorage.setItem("timerState", JSON.stringify(timerState));
  else localStorage.removeItem("timerState");
}

// ========== NAV ==========
function goPage(name, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  btn.classList.add("active");

  if (name === 'graph') renderGraphPage();
  if (name === 'cal') renderCalendar();
  if (name === 'plan') onDateChange();
  if (name === 'timer') updateTodayStats();
}

// ========== SUBJECTS ==========
function renderSubjects() {
  ['subject', 'planSubject'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = "";
    subjects.forEach(s => el.add(new Option(s, s)));
  });
  renderMultiSubjectTags();
  renderSettingsSubjects();
}

function renderMultiSubjectTags() {
  const c = document.getElementById("multi-subject-tags");
  c.innerHTML = "";
  subjects.forEach(s => {
    const tag = document.createElement("div");
    tag.className = "subject-tag" + (selectedSubjects.has(s) ? " selected" : "");
    tag.textContent = s;
    tag.onclick = () => {
      selectedSubjects.has(s) ? selectedSubjects.delete(s) : selectedSubjects.add(s);
      renderMultiSubjectTags();
      calcSelected();
    };
    c.appendChild(tag);
  });
}

function calcSelected() {
  let total = 0;
  for (let d in studyData) {
    selectedSubjects.forEach(s => {
      if (studyData[d][s]) total += studyData[d][s];
    });
  }
  document.getElementById("selected-total").textContent = Math.floor(total / 60);
}

function addSubject() {
  const v = document.getElementById("newSubject").value.trim();
  if (!v) return;
  if (subjects.includes(v)) return alert("すでにあります");
  subjects.push(v);
  document.getElementById("newSubject").value = "";
  save();
  renderSubjects();
}

function renderSettingsSubjects() {
  const c = document.getElementById("subject-list");
  c.innerHTML = "";
  subjects.forEach(s => {
    const item = document.createElement("div");
    item.className = "settings-item";
    item.innerHTML = `<span>${s}</span>`;
    if (!defaultSubjects.includes(s)) {
      const btn = document.createElement("button");
      btn.className = "btn btn-danger btn-sm";
      btn.textContent = "削除";
      btn.onclick = () => removeSubject(s);
      item.appendChild(btn);
    }
    c.appendChild(item);
  });
}

function removeSubject(s) {
  if (!confirm(s + "を削除する？")) return;
  subjects = subjects.filter(x => x !== s);
  save();
  renderSubjects();
}

// ========== TIMER ==========
let timerInterval = null;

function start() {
  Notification.requestPermission();
  const subject = document.getElementById("subject").value;
  const totalPages = Number(document.getElementById("pages").value);
  const timePerPage = Number(document.getElementById("time").value) * 60;
  if (!totalPages || !timePerPage) return alert("ページ数と時間を入力してください");

  timerState = {
    subject,
    totalPages,
    timePerPage,
    currentPage: 1,
    pageStartTime: Date.now(),
    isBreak: false,
    completedPages: 0
  };
  saveTimerState();

  document.getElementById("timer-card").style.display = "block";
  startTimerLoop();
}

function startTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 500);
}

function tickTimer() {
  if (!timerState) return;
  const now = Date.now();
  const elapsed = Math.floor((now - timerState.pageStartTime) / 1000);
  const remaining = timerState.timePerPage - elapsed;

  updateTimerDisplay(remaining);
  recordStudyTime();
}

let lastRecordedSecond = -1;
function recordStudyTime() {
  if (!timerState || timerState.isBreak) return;
  const now = Date.now();
  const elapsed = Math.floor((now - timerState.pageStartTime) / 1000);

  if (elapsed === lastRecordedSecond) return;
  lastRecordedSecond = elapsed;

  const d = today();
  if (!studyData[d]) studyData[d] = {};
  if (!studyData[d][timerState.subject]) studyData[d][timerState.subject] = 0;
  studyData[d][timerState.subject]++;
  save();
  updateTodayStats();
}

function updateTimerDisplay(remaining) {
  const disp = document.getElementById("timer-display");
  const status = document.getElementById("timer-status");
  const info = document.getElementById("timer-page-info");
  const progress = document.getElementById("timer-progress");

  if (!timerState) return;

  info.textContent = timerState.subject + " " + timerState.currentPage + "/" + timerState.totalPages + "ページ";

  if (timerState.isBreak) {
    disp.className = "timer-display break";
    status.textContent = "☕ 休憩中";
    disp.textContent = fmt(remaining);
    const pct = Math.max(0, (remaining / timerState.breakTime) * 100);
    progress.style.width = pct + "%";
  } else if (remaining < 0) {
    disp.className = "timer-display overtime";
    status.textContent = "⚠ オーバータイム";
    disp.textContent = "+" + fmt(remaining);
    progress.style.width = "100%";
  } else {
    disp.className = "timer-display normal";
    status.textContent = "📖 勉強中";
    disp.textContent = fmt(remaining);
    const pct = Math.max(0, (remaining / timerState.timePerPage) * 100);
    progress.style.width = pct + "%";
  }
}

function finish() {
  if (!timerState) return;

  if (!timerState.isBreak) {
    // 休憩へ
    timerState.isBreak = true;
    timerState.breakTime = Math.floor(timerState.timePerPage * 0.2); // 20%休憩
    timerState.pageStartTime = Date.now();
    saveTimerState();
  } else {
    // 次のページへ
    timerState.currentPage++;
    timerState.isBreak = false;
    timerState.pageStartTime = Date.now();
    saveTimerState();

    if (timerState.currentPage > timerState.totalPages) {
      completeSession();
    }
  }
}

function completeSession() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerState = null;
  saveTimerState();
  document.getElementById("timer-card").style.display = "none";
  alert("🎉 完了！お疲れ様でした！");
  updateTodayStats();
}

function stopTimer() {
  if (!confirm("タイマーを止めますか？")) return;
  clearInterval(timerInterval);
  timerInterval = null;
  timerState = null;
  saveTimerState();
  document.getElementById("timer-card").style.display = "none";
  document.getElementById("timer-display").textContent = "0:00";
  updateTodayStats();
}

function updateTodayStats() {
  const d = today();
  let totalSec = 0;
  if (studyData[d]) {
    for (let s in studyData[d]) totalSec += studyData[d][s];
  }
  document.getElementById("today-total").textContent = Math.floor(totalSec / 60);

  // ページ数（タイマーから）
  const pages = timerState ? timerState.currentPage - 1 : 0;
  document.getElementById("today-pages").textContent = pages;
}

// ========== GRAPH ==========
function switchChart(mode) {
  chartMode = mode;
  document.getElementById("btn-day").classList.toggle("active", mode === 'day');
  document.getElementById("btn-month").classList.toggle("active", mode === 'month');
  renderGraphPage();
}

function renderGraphPage() {
  renderMainChart();
  renderMultiSubjectTags();
  calcSelected();
}

function renderMainChart() {
  let labels = [], data = [];

  if (chartMode === 'day') {
    const allDates = Object.keys(studyData).sort();
    labels = allDates;
    data = allDates.map(d => {
      let sum = 0;
      for (let s in studyData[d]) sum += studyData[d][s];
      return Math.floor(sum / 60);
    });
  } else {
    const monthMap = {};
    for (let d in studyData) {
      const m = d.slice(0, 7);
      let sum = 0;
      for (let s in studyData[d]) sum += studyData[d][s];
      monthMap[m] = (monthMap[m] || 0) + Math.floor(sum / 60);
    }
    labels = Object.keys(monthMap).sort();
    data = labels.map(m => monthMap[m]);
  }

  if (mainChart) mainChart.destroy();
  const ctx = document.getElementById("mainChart").getContext("2d");
  mainChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: "#7c6af755",
        borderColor: "#7c6af7",
        borderWidth: 2,
        borderRadius: 6
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#9090b0", font: { size: 10 } }, grid: { color: "#242440" } },
        y: { ticks: { color: "#9090b0" }, grid: { color: "#242440" } }
      }
    }
  });
}

// ========== PLAN ==========
function onDateChange() {
  const d = document.getElementById("datePicker").value;
  renderPlanList(d);
  renderActual(d);
}

function addPlan() {
  const d = document.getElementById("datePicker").value;
  if (!d) return alert("日付を選んでください");
  const subject = document.getElementById("planSubject").value;
  const pages = document.getElementById("planPages").value;
  const time = document.getElementById("planTime").value;
  if (!pages || !time) return alert("ページと時間を入力してください");

  if (!plans[d]) plans[d] = [];
  plans[d].push({ subject, pages: Number(pages), time: Number(time), done: false });
  save();
  renderPlanList(d);
  renderActual(d);
  renderCalendar();
}

function renderPlanList(d) {
  const c = document.getElementById("plan-list-area");
  c.innerHTML = "";
  if (!plans[d] || plans[d].length === 0) return;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = '<div class="card-label">予定リスト</div>';

  plans[d].forEach((p, i) => {
    const item = document.createElement("div");
    item.className = "plan-item" + (p.done ? " plan-done" : "");
    item.innerHTML = `
      <input type="checkbox" class="plan-check" ${p.done ? "checked" : ""} onchange="toggleDone('${d}',${i})">
      <div class="plan-info">
        <div class="plan-subject">${p.subject}</div>
        <div class="plan-detail">${p.pages}ページ / ${p.time}分</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deletePlan('${d}',${i})">削除</button>
    `;
    card.appendChild(item);
  });

  c.appendChild(card);
}

function toggleDone(d, i) {
  plans[d][i].done = !plans[d][i].done;
  save();
  renderPlanList(d);
}

function deletePlan(d, i) {
  if (!confirm(plans[d][i].subject + "を削除する？")) return;
  plans[d].splice(i, 1);
  save();
  renderPlanList(d);
  renderActual(d);
  renderCalendar();
}

function renderActual(d) {
  const area = document.getElementById("actual-area");
  const list = document.getElementById("actual-list");
  const rateEl = document.getElementById("rate-display");

  const hasActual = studyData[d] && Object.keys(studyData[d]).length > 0;
  const hasPlan = plans[d] && plans[d].length > 0;

  if (!hasActual && !hasPlan) { area.style.display = "none"; return; }
  area.style.display = "block";

  list.innerHTML = "";
  let actualMin = 0;
  if (studyData[d]) {
    for (let s in studyData[d]) {
      const min = Math.floor(studyData[d][s] / 60);
      actualMin += min;
      const item = document.createElement("div");
      item.className = "actual-item";
      item.innerHTML = `<span>${s}</span><span class="actual-time">${min}分</span>`;
      list.appendChild(item);
    }
  }

  let plannedMin = 0;
  if (plans[d]) plans[d].forEach(p => plannedMin += Number(p.time));

  const rate = plannedMin ? Math.min(999, Math.floor((actualMin / plannedMin) * 100)) : 0;
  rateEl.textContent = (plannedMin ? rate : "--") + "%";
  rateEl.style.color = rate >= 100 ? "var(--green)" : rate >= 50 ? "var(--accent2)" : "var(--red)";

  if (compareChart) compareChart.destroy();
  const ctx = document.getElementById("compareChart").getContext("2d");
  compareChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["予定", "実績"],
      datasets: [{
        data: [plannedMin, actualMin],
        backgroundColor: ["#7c6af755", "#5fcb8b55"],
        borderColor: ["#7c6af7", "#5fcb8b"],
        borderWidth: 2,
        borderRadius: 8
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#9090b0" }, grid: { color: "#242440" } },
        y: { ticks: { color: "#9090b0" }, grid: { color: "#242440" } }
      }
    }
  });
}

// ========== CALENDAR ==========
function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const y = currentCalDate.getFullYear();
  const m = currentCalDate.getMonth();
  document.getElementById("monthLabel").textContent = y + "年" + (m + 1) + "月";

  const todayStr = today();
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div");
    el.className = "cal-day empty";
    cal.appendChild(el);
  }

  for (let d = 1; d <= lastDate; d++) {
    const ds = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const el = document.createElement("div");
    let cls = "cal-day";
    if (ds === todayStr) cls += " today";
    if (plans[ds] && plans[ds].length) cls += " has-plan";
    if (studyData[ds]) cls += " has-study";
    el.className = cls;
    el.textContent = d;
    el.onclick = () => selectCalDate(ds);
    cal.appendChild(el);
  }
}

function changeMonth(n) {
  currentCalDate.setMonth(currentCalDate.getMonth() + n);
  renderCalendar();
}

function selectCalDate(ds) {
  const detail = document.getElementById("cal-detail");
  const dateLabel = document.getElementById("cal-detail-date");
  const content = document.getElementById("cal-detail-content");

  detail.style.display = "block";
  dateLabel.textContent = ds;
  content.innerHTML = "";

  // 予定表示
  if (plans[ds] && plans[ds].length) {
    content.innerHTML += '<div class="section-title">予定</div>';
    plans[ds].forEach(p => {
      content.innerHTML += `<div class="actual-item"><span>${p.subject} ${p.pages}p</span><span class="actual-time">${p.time}分</span></div>`;
    });
  }

  // 実績表示
  if (studyData[ds]) {
    content.innerHTML += '<div class="section-title">実績</div>';
    for (let s in studyData[ds]) {
      content.innerHTML += `<div class="actual-item"><span>${s}</span><span class="actual-time">${Math.floor(studyData[ds][s] / 60)}分</span></div>`;
    }
  }

  if (!plans[ds] && !studyData[ds]) {
    content.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 0">記録なし</div>';
  }

  detail.scrollIntoView({ behavior: "smooth" });
}

// ========== SETTINGS ==========
function clearData() {
  if (!confirm("全データを消去します。よろしいですか？")) return;
  studyData = {};
  plans = {};
  timerState = null;
  save();
  saveTimerState();
  location.reload();
}
</script>
